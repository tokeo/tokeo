### {{ app_name }} AI / Fundi configuration
###
### Sections below: tools, guards/transformers/conductors, sandboxes, agents,
### profiles. Every entry uses the uniform item form ("type" + "options"); a
### list value is a named group. For the full model (the governor pipeline, the
### sandbox chain, budget resolution, deny) see the ai config reference that
### ships with tokeo: tokeo/core/ai/config/CONFIG.md.
ai:
  ### app-wide loop budgets (nearest wins: call arg > agent option > this base)
  # max_steps: 0            # max tool rounds per request (0 = unlimited)
  # max_loops: 3            # consecutive rounds without a successful call
  # trace: true             # record the step history (result.trace)

  ### selection when a command names none ("profile" = model, "agent" = tools)
  defaults:
    profile: mock
    agent: null

  ### the toolset. an item is "type" (+ "options"); a list value is a group a
  ### profile/agent can activate by name
  tools:
    calc:
      type: {{ app_label }}.core.ai.tools.calc.TokeoAiCalcTool
    ### always answers 42; its description marks the result authoritative
    answer42:
      type: {{ app_label }}.core.ai.tools.calc42.TokeoAiAnswer42Tool
    current:
      type: {{ app_label }}.core.ai.tools.current.TokeoAiCurrentTool
    ### reads text files strictly below base_dir
    read_file:
      type: {{ app_label }}.core.ai.tools.read_file.TokeoAiReadFileTool
      options:
        base_dir: tmp
    ### the writing tool -- denied by the "readonly" policy guard below
    append_file:
      type: {{ app_label }}.core.ai.tools.append_file.TokeoAiAppendFileTool
      options:
        base_dir: tmp
        file: notes.txt
    mathematics:
      - calc
    ### calendar tools the akili micro model drives (strict iso dates)
    date_daydiff:
      type: {{ app_label }}.core.ai.tools.date_daydiff.TokeoAiDateDayDiffTool
    add_days:
      type: {{ app_label }}.core.ai.tools.add_days.TokeoAiAddDaysTool
    add_months:
      type: {{ app_label }}.core.ai.tools.add_months.TokeoAiAddMonthsTool
    add_years:
      type: {{ app_label }}.core.ai.tools.add_years.TokeoAiAddYearsTool
    weekday:
      type: {{ app_label }}.core.ai.tools.weekday.TokeoAiWeekdayTool
    week_number:
      type: {{ app_label }}.core.ai.tools.week_number.TokeoAiWeekNumberTool
    moon_phase:
      type: {{ app_label }}.core.ai.tools.moon_phase.TokeoAiMoonPhaseTool
    filesystem:
      - read_file
      - append_file
    calendar:
      - current
      - date_daydiff
      - add_days
      - add_months
      - add_years
      - weekday
      - week_number
      - moon_phase
    ### runs model-generated python -- DANGER, only safe behind the wasm sandbox
    coding:
      type: tokeo.core.ai.tools.TokeoAiPythonUntrustedExecTool

  ### guards check a call and may deny it (deny-and-continue). an item: "type"
  ### is a built-in short name or a dotted class path, settings under "options"
  guards:
    ### checks call arguments against the tool's parameters schema
    tool_schema_validate:
      type: tool_schema_validate
    ### allow/deny tool calls by name (deny wins); here: read yes, write no
    readonly:
      type: tool_policy
      options:
        deny:
          - append_file
    ### logs every step at every stage, blocks nothing
    trace_audit:
      type: trace_audit
    ### masks secret-looking spans at the tool stages; "patterns" is required
    regex_redact:
      type: regex_redact
      options:
        patterns:
          - '(?i)\bbearer\s+[A-Za-z0-9._\-]{8,}'
          - '\bsk-[A-Za-z0-9]{16,}\b'
          - '\bAKIA[0-9A-Z]{16}\b'
          - '(?i)\b(?:api[_-]?key|secret|password|token)\b\s*[:=]\s*\S+'
  ### transformers reshape (mask, rewrite, enrich) but never deny. same item
  ### form as guards; the core ships no built-in type, so "type" is a dotted path
  transformers:
    ### caps over-long text (project example, core/ai/transformers/truncate.py)
    truncate:
      type: {{ app_label }}.core.ai.transformers.truncate.{{ app_class_name }}AiTruncateTransformer
      options:
        limit: 500

  ### conductors steer the run (order, redirect, drive). same item form as
  ### guards; no built-in type yet, so "type" is a dotted class path
  conductors: {}

  ### sandboxes contain a tool's execution. an agent lists a chain; a tool runs
  ### in the first sandbox whose "tools" contain it, else the call is denied
  sandboxes:
    ### zero isolation, in-process; put last as the "_all" catch-all
    allow:
      type: in_process
      tools: _all
    ### fault/resource isolation in a subprocess (timeout + optional memory cap);
    ### not a jail against hostile code
    jailed:
      type: subprocess
      tools:
        - mathematics
      options:
        timeout: 10            # wall-clock seconds, then SIGKILL
        # memory_mb: 256       # rlimit cap (linux; macos rejects small caps)
        cwd: tmp/sandbox
    ### real isolation for model code: a wasm guest, hard memory cap, no network.
    ### opt-in -- needs tokeo[wasm] and a built python.wasm (core/ai/sandboxes/WASM.md)
    coded:
      type: tokeo.core.ai.sandboxes.TokeoAiWasmSandbox
      tools:
        - coding
      options:
        runtime: ./wasm/python.wasm
        stdlib: ./wasm/lib/python3.13
        memory_mb: 256
        timeout: 10

  ### agents are the composition root: they bind tools, governors and the sandbox
  ### chain and set the budget. the model is bound late via the profile. an item:
  ### "type" ("fundi" or a dotted path), settings under "options"
  agents:
    ### default agent (defaults.agent): governs nothing, audits everything
    audited:
      type: fundi
      options:
        ### the governor pipeline, in order (guards/transformers/conductors)
        governors:
          - trace_audit
        sandboxes:
          - allow
        ### other options an agent may take:
        # tools: [mathematics]          # tools this agent contributes
        # deny: [append_file]           # hard ban, before any sandbox lookup
        # max_steps: 0                  # override the base budgets for this agent
        # max_loops: 3

    ### guarded project tools: read/calc/time yes, write denied; results
    ### redacted and capped, every outcome audited. calc runs jailed.
    ###   {{ app_label }} ai ask "append_file hello" --agent guarded   # denied
    guarded:
      type: fundi
      options:
        tools:
          - mathematics
          - calendar
          - filesystem
        governors:
          - readonly
          - tool_schema_validate
          - regex_redact
          - truncate
          - trace_audit
        sandboxes:
          - jailed
          - allow

    ### runs model-written code in the wasm guest (opt-in, needs ./wasm).
    ###   {{ app_label }} ai ask "text reverse otto" --agent coder
    coder:
      type: fundi
      options:
        tools:
          - coding
        governors:
          - trace_audit
        sandboxes:
          - coded

    ### showcase: the truncate transformer at on_close only ("[stages]" stage list).
    ###   {{ app_label }} ai ask "tell me a longer story" --agent showcase
    showcase:
      type: fundi
      options:
        tools:
          - mathematics
          - calendar
        governors:
          - truncate: [on_close]
          - trace_audit
        sandboxes:
          - allow

    ### house-tool demo: offers only answer42 (always returns 42).
    ###   {{ app_label }} ai ask "divide 5 by 2 with our tool" --agent answer42
    answer42:
      type: fundi
      options:
        tools:
          - answer42
        governors:
          - trace_audit
        sandboxes:
          - allow

  ### profiles bind the model. an item: "type" is a provider short name or a
  ### dotted path; connection settings under "options"; "agent" names the agent
  profiles:
    ### the built-in local mock: deterministic, no server (calls a tool when the
    ### first prompt word names one).
    ###   {{ app_label }} ai ask "calc 2 + 3" --agent guarded
    mock:
      type: mock
      purpose: mocking
      agent: guarded

    ### the project's own trained akili micro model (in {{ app_label }}/core/akili):
    ### plans real tool chains in-process, no server. train once, then ask
    ### (AKILI-USE.md walks the demos):
    ###   python -m {{ app_label }}.core.akili.train
    ###   {{ app_label }} ai ask "wochentag von heute plus 14 tage" --profile akili
    akili:
      type: {{ app_label }}.core.ai.providers.akili.TokeoAiAkiliProvider
      purpose: calendar
      ### shares the guarded agent but denies the tools it does not need
      agent: guarded
      deny:
        - mathematics
        - filesystem

    ### mock against the coder agent -- synthesizes python that runs in wasm.
    ###   {{ app_label }} ai ask "text upper der wochentag von heute" --profile codermock
    codermock:
      type: mock
      purpose: codeact
      agent: coder

    ### an OpenAI-compatible server you run yourself (ollama, vllm, llama.cpp,
    ### mlx). set <modelname> to the id your server exposes.
    ###   {{ app_label }} ai ask "hauptstadt von frankreich" --profile assistant
    assistant:
      type: oai_compat
      options:
        model: "<modelname>"
        base_url: http://localhost:8000/v1
        # key: ${OPENAI_API_KEY}     # env/vault resolution; never clear text
        # timeout: 120
      ### passed straight to the endpoint; override per call with --model_param
      ### key=value. common: temperature, top_p, max_tokens, stop, seed,
      ### response_format, tool_choice (see tokeo CONFIG.md § 8)
      ### common keys:
      ###   temperature      randomness/creativity, ~0.0-2.0 (lower = focused)
      ###   top_p            nucleus sampling cutoff, 0.0-1.0
      ###   max_tokens       cap on the generated answer length
      ###   frequency_penalty / presence_penalty   damp repetition, ~-2.0-2.0
      ###   stop             string or list that ends generation
      ###   seed             fixed value for (mostly) reproducible output
      ###   response_format  e.g. {type: json_object} for structured output
      ###   tool_choice      auto/none/required, or a named function
      # model_params:
      #   temperature: 0.2
      #   top_p: 0.9
      #   max_tokens: 1024
      purpose: assistant
      agent: guarded
