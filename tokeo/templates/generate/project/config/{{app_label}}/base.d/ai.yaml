### ### {{ app_name }} AI / Fundi configuration
###
### Named profiles for chat-completion models. {{ app_name }} talks to an
### OpenAI-compatible endpoint that you run yourself (Ollama, llama.cpp, vLLM,
### MLX); the built-in fundi model needs no server and is handy for tests and
### demos. A profile is selected by name, or by a field such as model or
### purpose; a profile with "enabled: false" is hidden for the session.
ai:
  ### selection used when a command (for example "ai ask") names none:
  ### "profile" is the model, "agent" the composition (tools, and later
  ### guards). either may be omitted; a call can still pick one explicitly
  defaults:
    profile: mock
    agent: main

  ### the configured toolset, in the uniform form used across the ai config:
  ### a dict value is an item ("type" names the class -- a built-in short
  ### name or a full dotted class path -- plus optional "options"); a list
  ### value is a named group of members (tools or other groups). a profile
  ### then activates a single item or a whole group
  tools:
    ### a project tool, named by its full dotted class path: no registration,
    ### no entry in main.py -- the handler imports it on demand
    calc:
      type: {{ app_label }}.core.ai.tools.calc.TokeoAiCalcTool
    ### the simplest schema: no arguments; its reply format is a tool
    ### setting (Meta key), overridable here under "options"
    current:
      type: {{ app_label }}.core.ai.tools.current.TokeoAiCurrentTool
    ### reads text files strictly below base_dir (a tool setting); paths
    ### that escape it are rejected inside the tool
    read_file:
      type: {{ app_label }}.core.ai.tools.read_file.TokeoAiReadFileTool
      options:
        base_dir: tmp
    ### appends a line to the configured file below base_dir -- the writing
    ### tool, and so the one the "readonly" policy guard below denies
    append_file:
      type: {{ app_label }}.core.ai.tools.append_file.TokeoAiAppendFileTool
      options:
        base_dir: tmp
        file: notes.txt
    ### a named group that bundles math-related tools
    mathematics:
      - calc
    ### a named group that bundles the file tools
    filesystem:
      - read_file
      - append_file

  ### guards form the tool-call pipeline of an agent: a before guard may
  ### deny a call ahead of execution, an after guard observes the outcome
  ### (it always runs, so a denial is recorded too). a denied call is not
  ### executed; the loop continues and the model sees "denied: <reason>",
  ### so it can correct itself (deny-and-continue). a guard is an item in
  ### the uniform form: "type" is a built-in short name (validate, policy,
  ### audit) or a full dotted class path, its settings live under "options"
  guards:
    ### checks a call's arguments against the tool's parameters schema
    ### before it runs (missing required, unknown names, wrong basic types)
    validate:
      type: validate
    ### allow/deny tool calls by name: "deny" always wins; "allow", when
    ### set, restricts calls to its members. here it shapes what the agent
    ### may do with the file pair: read yes, write no
    readonly:
      type: policy
      options:
        deny:
          - append_file
    ### logs every outcome (returned, denied, errored) to the app log and
    ### blocks nothing; the structured trace is on the ChatResult
    audit:
      type: audit

  ### agents are the composition root: an agent binds the tools and guards
  ### for a task and sets the step budget. the model is not part of the
  ### agent -- it is bound late through the selected profile, so one agent
  ### runs against any model. an agent is an item in the uniform form:
  ### "type" is a built-in short name ("default") or a full dotted class
  ### path, and the agent's settings live under "options". the active tools
  ### of a call are the selected profile's tools and the agent's tools
  ### combined (deduplicated)
  agents:
    ### the default composition root, selected via defaults.agent above
    main:
      ### built-in agent type; no custom class needed
      type: default
      ### the agent's settings (its Meta keys)
      # options:
      #   ### tools this agent contributes, combined with the selected
      #   ### profile's own tools (deduplicated). left empty here -- the mock
      #   ### profile below already activates the mathematics group
      #   tools:
      #     - mathematics
      #   ### guards forming this agent's tool-call pipeline (see ai.guards)
      #   guards:
      #     - audit
      #   ### maximum tool rounds for one request (0 = unlimited)
      #   max_steps: 0
      #   ### consecutive rounds without one successful call before the
      #   ### execution is aborted (0 = unlimited)
      #   max_loops: 3

    ### the guarded composition around the project tools: it may calculate,
    ### tell the time, and read files, but the policy denies writing; every
    ### outcome is audited. try, and watch the "ai audit: ..." log lines:
    ###   {{ app_label }} ai ask "current" --agent mock
    ###   {{ app_label }} ai ask "read_file notes.txt" --agent mock
    ###   {{ app_label }} ai ask "append_file hello" --agent mock   # denied by policy
    mock:
      type: default
      options:
        tools:
          - mathematics
          - current
          - filesystem
        guards:
          - readonly
          - validate
          - audit

  ### named profiles in the uniform form: top-level params (type, purpose,
  ### tools, enabled) plus an "options" block carrying the provider's
  ### connection settings (model, base_url, key). a profile is an item; its
  ### "type" is a provider short name or a full dotted class path
  profiles:
    ### the built-in local model; deterministic, no server, no network
    mock:
      ### provider type; "mock" is the application's own local model and
      ### needs no options (it ignores model and server)
      type: mock
      ### optional free-form selector, usable via "ai ask --purpose"
      purpose: mocking
      ### tools this profile may use; each entry is an item or a group from
      ### ai.tools above. the "mathematics" group activates calc, so
      ### "ai ask calc 2 + 3" works
      tools:
        - mathematics

    ### a local, OpenAI-compatible server you run yourself
    # assistant:
    #   ### provider type; "openai" speaks the OpenAI-compatible chat api
    #   type: openai
    #   ### provider connection settings live under "options"
    #   options:
    #     ### model name as your local server exposes it
    #     model: qwen2.5
    #     ### base url of the running server (ollama 11434, vllm 8000, mlx 8080)
    #     base_url: http://localhost:11434/v1
    #     ### optional api key; local servers usually ignore it, vault-backed
    #     ### with a !vault:<profile> tag when a real key is needed
    #     # key: not-needed
    #   ### optional free-form selector, usable via "ai ask --purpose"
    #   purpose: general
