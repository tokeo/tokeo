### ### {{ app_name }} AI / Fundi configuration
###
### Named profiles for chat-completion models. {{ app_name }} talks to an
### OpenAI-compatible endpoint that you run yourself (Ollama, llama.cpp, vLLM,
### MLX); the project's own trained akili micro model (core/ai/providers/akili.py
### and core/akili) needs no server at all. A profile is selected by name,
### or by a field such as model or purpose; a profile with "enabled: false"
### is hidden for the session.
ai:
  ### selection used when a command (for example "ai ask") names none:
  ### "profile" is the model, "agent" the composition (tools, and later
  ### guards). either may be omitted; a call can still pick one explicitly
  defaults:
    profile: mock
    agent: null

  ### the configured toolset, in the uniform form used across the ai config:
  ### a dict value is an item ("type" names the class -- a built-in short
  ### name or a full dotted class path -- plus optional "options"); a list
  ### value is a named group of members (tools or other groups). a profile
  ### then activates a single item or a whole group
  tools:
    ### a project tool, named by its full dotted class path: no registration,
    ### no entry in main.py -- the handler imports it on demand
    calc:
      type: {{ app_label }}.core.ai.tools.calc.TokeoAiCalcTool
    ### the simplest schema: no arguments; its reply format is a tool
    ### setting (Meta key), overridable here under "options"
    current:
      type: {{ app_label }}.core.ai.tools.current.TokeoAiCurrentTool
    ### reads text files strictly below base_dir (a tool setting); paths
    ### that escape it are rejected inside the tool
    read_file:
      type: {{ app_label }}.core.ai.tools.read_file.TokeoAiReadFileTool
      options:
        base_dir: tmp
    ### appends a line to the configured file below base_dir -- the writing
    ### tool, and so the one the "readonly" policy guard below denies
    append_file:
      type: {{ app_label }}.core.ai.tools.append_file.TokeoAiAppendFileTool
      options:
        base_dir: tmp
        file: notes.txt
    ### a named group that bundles math-related tools
    mathematics:
      - calc
    ### the calendar toolset the akili micro model drives; every tool takes
    ### strict iso dates (YYYY-MM-DD) -- understanding looser language is
    ### the model's job, not the tool's
    date_diff:
      type: {{ app_label }}.core.ai.tools.date_diff.TokeoAiDateDiffTool
    add_days:
      type: {{ app_label }}.core.ai.tools.add_days.TokeoAiAddDaysTool
    add_months:
      type: {{ app_label }}.core.ai.tools.add_months.TokeoAiAddMonthsTool
    add_years:
      type: {{ app_label }}.core.ai.tools.add_years.TokeoAiAddYearsTool
    weekday:
      type: {{ app_label }}.core.ai.tools.weekday.TokeoAiWeekdayTool
    week_number:
      type: {{ app_label }}.core.ai.tools.week_number.TokeoAiWeekNumberTool
    moon_phase:
      type: {{ app_label }}.core.ai.tools.moon_phase.TokeoAiMoonPhaseTool
    ### a named group that bundles the file tools
    filesystem:
      - read_file
      - append_file
    ### a named group that bundles the calendar tools (current resolves the
    ### time words today/now for the akili model)
    calendar:
      - current
      - date_diff
      - add_days
      - add_months
      - add_years
      - weekday
      - week_number
      - moon_phase
    ### the codeact tool for the wasm demo: it runs model-generated python in
    ### the wasm guest. DANGER -- it executes arbitrary code, so it is only
    ### safe behind the wasm sandbox (or a hardened container), never
    ### in-process. not registered by default, so it is named by its full
    ### dotted class path. paired with the "coded" sandbox and "codermock"
    ### agent below, driven by the mock's "text upper|reverse|len <sentence>"
    coding:
      type: tokeo.core.ai.tools.python_untrusted_exec.TokeoAiPythonUntrustedExecTool

  ### guards form the tool-call pipeline of an agent: a before guard may
  ### deny a call ahead of execution, an after guard observes the outcome
  ### (it always runs, so a denial is recorded too). a denied call is not
  ### executed; the loop continues and the model sees "denied: <reason>",
  ### so it can correct itself (deny-and-continue). a guard is an item in
  ### the uniform form: "type" is a built-in short name (validate, policy,
  ### audit, redact, truncate) or a full dotted class path, its settings
  ### live under "options"
  guards:
    ### checks a call's arguments against the tool's parameters schema
    ### before it runs (missing required, unknown names, wrong basic types)
    validate:
      type: validate
    ### allow/deny tool calls by name: "deny" always wins; "allow", when
    ### set, restricts calls to its members. here it shapes what the agent
    ### may do with the file pair: read yes, write no
    readonly:
      type: policy
      options:
        deny:
          - append_file
    ### logs every outcome (returned, denied, errored) to the app log and
    ### blocks nothing; the structured trace is on the ChatResult
    audit:
      type: audit
    ### masks secret-looking spans in a tool result after it ran (bearer
    ### tokens, sk- keys, aws key ids, password:/token: assignments); add
    ### project patterns under "options.patterns". list it before truncate
    redact:
      type: redact
    ### caps an over-long tool result so a big blob cannot blow the context
    ### budget; keeps the head and appends a "[truncated N chars]" marker
    truncate:
      type: truncate
      options:
        limit: 2000

  ### sandboxes contain a tool's execution -- a guard decides if a call may
  ### run, a sandbox is the wall it runs behind. an agent lists a sandbox
  ### chain; a tool runs in the first sandbox whose "tools" contain it (a
  ### selection of tool/group names, or "_all" for every tool that
  ### reaches it). a sandbox "except" skips that sandbox for the named tools
  ### so the chain walks on. when no sandbox lists a tool the call is denied,
  ### so the "allow" sandbox (in_process, tools: _all) placed last is the
  ### opt-in catch-all. a sandbox is an item: "type" is a built-in short name
  ### (in_process, subprocess) or a full dotted class path, its settings live
  ### under "options"
  sandboxes:
    ### the catch-all: zero isolation, runs in the app process. put it last
    ### in a chain to let the remaining tools run in-process; without it an
    ### unlisted tool is denied
    allow:
      type: in_process
      ### "_all" is the reserved keyword for "every tool that reaches me"
      tools: _all
    ### fault and resource isolation in a fresh interpreter: own memory cap
    ### and wall-clock timeout, then SIGKILL. NOT a jail against hostile code
    ### (no path or network isolation -- that needs a container or wasm). here
    ### it contains the calculator
    jailed:
      type: subprocess
      tools:
        - mathematics
      options:
        ### wall-clock seconds before the run is killed -- enforced on every
        ### platform (the parent kills the child), the universal stop
        timeout: 10
        ### memory cap in MB, enforced via rlimit on linux. current macos
        ### rejects caps below the process's already-mapped virtual space
        ### (gigabytes on apple silicon), so realistic values error the
        ### call there by design (no sham caps) -- enable on linux
        # memory_mb: 256
        ### scratch working directory (steers relative writes)
        cwd: tmp/sandbox
    ### real isolation for model-generated code: a webassembly guest with no
    ### network, only explicit mounts, and a hard memory cap on every platform
    ### -- the safe home for the python_untrusted_exec tool. opt-in: it needs
    ### the tokeo[wasm] extra and a user-built python.wasm; see the wasm doc
    ### at core/ai/sandboxes/WASM.md for the one-time ./wasm install. wasm and
    ### the python-exec tools are not registered by default, so the type is the
    ### full dotted class path (resolved on demand)
    coded:
      type: tokeo.core.ai.sandboxes.wasm.TokeoAiWasmSandbox
      tools:
        - coding
      options:
        ### point these at your ./wasm build (see WASM.md); the demo only runs
        ### once they exist, otherwise the call errors with a clear message
        runtime: ./wasm/python.wasm
        stdlib: ./wasm/lib/python3.13
        ### a hard, platform-independent memory cap and a wall-clock timeout
        memory_mb: 256
        timeout: 10

  ### agents are the composition root: an agent binds the tools, the guards,
  ### and the sandbox chain for a task and sets the step budget. the model is
  ### not part of the agent -- it is bound late through the selected profile,
  ### so one agent runs against any model. an agent is an item in the uniform
  ### form: "type" is a built-in short name ("fundi", the standard agent) or a
  ### full dotted class path, and the agent's settings (tools, guards,
  ### sandboxes, deny, budgets) live under "options". the active tools of a
  ### call are the agent's tools
  agents:
    ### the default composition root, selected via defaults.agent above:
    ### it governs nothing, but it observes everything -- the audit guard
    ### gives every request the "ai audit: ..." log lines and the full
    ### structured trace on the ChatResult, with honest semantics (a
    ### pipeline ran; one that denies nothing)
    audited:
      ### built-in agent type ("fundi", the standard agent); no custom class
      type: fundi
      ### the agent's settings (its Meta keys)
      options:
        ### guards forming this agent's tool-call pipeline (see ai.guards)
        guards:
          - audit
        ### the sandbox chain: with the catch-all "allow" any tool this agent
        ### gains runs in-process; drop it and an unlisted tool is denied
        sandboxes:
          - allow
        ### further settings an agent may take:
        ### tools this agent contributes (the active tools of a call)
        # tools:
        #   - mathematics
        ### tools or groups this agent forbids outright (single or list),
        ### before any sandbox lookup -- a hard ban, unlike a sandbox except
        # deny:
        #   - append_file
        ### maximum tool rounds for one request (0 = unlimited)
        # max_steps: 0
        ### consecutive rounds without one successful call before the
        ### execution is aborted (0 = unlimited)
        # max_loops: 3

    ### the guarded composition around the project tools: it may calculate,
    ### tell the time, and read files, but the policy denies writing; tool
    ### results are redacted and capped, and every outcome is audited. the
    ### calculator runs in the "jailed" subprocess sandbox, everything else
    ### falls through to "allow" (in-process). try, and watch the denial:
    ###   {{ app_label }} ai ask "current" --agent guarded
    ###   {{ app_label }} ai ask "read_file notes.txt" --agent guarded
    ###   {{ app_label }} ai ask "append_file hello" --agent guarded   # denied
    guarded:
      type: fundi
      options:
        tools:
          - mathematics
          - calendar
          - filesystem
        guards:
          - readonly
          - validate
          - redact
          - truncate
          - audit
        ### ordered chain: "jailed" (subprocess) lists calc, the rest
        ### is not, so it falls through to the "allow" catch-all (in-process)
        sandboxes:
          - jailed
          - allow

    ### the codeact demo: the mock turns a "text upper|reverse|len <sentence>"
    ### prompt into model-generated python, and this agent runs it in the wasm
    ### guest -- real isolation for code the model wrote. opt-in: it needs the
    ### ./wasm build (see core/ai/sandboxes/WASM.md). every call is audited, so
    ### the log shows the synthesized code ran in sandbox "coded". try:
    ###   {{ app_label }} ai ask "text upper der wochentag von heute" --agent codermock
    ###   {{ app_label }} ai ask "text reverse otto" --agent codermock
    ###   {{ app_label }} ai ask "text len wir sehen uns in 7 tagen" --agent codermock
    codermock:
      type: fundi
      options:
        ### only this agent offers the coding tool, so the mock's codeact
        ### synthesis activates only here -- the other agents never run code
        tools:
          - coding
        guards:
          - audit
        ### the coding tool runs in the wasm guest; nothing falls through to
        ### in-process, so any other tool would be denied by default
        sandboxes:
          - coded

  ### named profiles in the uniform form: top-level params (type, purpose,
  ### tools, enabled) plus an "options" block carrying the provider's
  ### connection settings (model, base_url, key). a profile is an item; its
  ### "type" is a provider short name or a full dotted class path
  profiles:
    ### the built-in local model; deterministic, no server, no network. it is
    ### the universal test/demo driver, so it keeps all of the guarded agent's
    ### tools (it makes a tool call when the first prompt word names one):
    ###   {{ app_label }} ai ask "calc 2 + 3" --agent guarded
    ###   {{ app_label }} ai ask "current" --agent guarded
    mock:
      ### provider type; "mock" is the application's own local model and
      ### needs no options (it ignores model and server)
      type: mock
      ### optional free-form selector, usable via "ai ask --purpose"
      purpose: mocking
      ### the agent (composition) this profile runs. a profile must state its
      ### agent, even as null to run without one
      agent: guarded

    ### the project's own micro language model (the lab and the weights
    ### live in {{ app_label }}/core/akili): trained from scratch on the project's
    ### synthetic calendar data, it plans real tool chains -- also nested
    ### requests like "the weekday of today plus 2 days" -- and runs
    ### in-process with plain numpy, no server. train-first: create the
    ### weights once with "python -m {{ app_label }}.core.akili.train",
    ### then try ({{ app_label }}/core/akili/AKILI-USE.md walks all demos):
    ###   {{ app_label }} ai ask "wochentag von heute plus 14 tage" --profile akili
    ###   {{ app_label }} ai ask "weekday of 2026-12-24" --profile akili --json
    akili:
      type: {{ app_label }}.core.ai.providers.akili.TokeoAiAkiliProvider
      purpose: calendar
      ### shares the guarded agent (its guard pipeline and jailed -> allow
      ### sandbox chain) but adds no tools of its own and "deny"s the ones it
      ### does not need, keeping only the calendar tools. the active tools are
      ### agent.tools minus agent.deny minus this profile.deny
      agent: guarded
      deny:
        - mathematics
        - filesystem

    ### the codeact demo profile: the deterministic mock provider against the
    ### codermock agent. a "text upper|reverse|len <sentence>" prompt makes the
    ### mock synthesize python, which runs in the wasm guest -- the model
    ### writes code, the sandbox isolates it. opt-in: needs the ./wasm build
    ### (core/ai/sandboxes/WASM.md). use --json to see the synthesized code and
    ### the sandbox in the trace:
    ###   {{ app_label }} ai ask "text upper der wochentag von heute" --profile codermock
    ###   {{ app_label }} ai ask "text reverse otto" --profile codermock --json
    codermock:
      type: mock
      purpose: codeact
      agent: codermock

    ### a local, OpenAI-compatible server you run yourself
    # assistant:
    #   ### provider type; "openai" speaks the OpenAI-compatible chat api
    #   type: openai
    #   ### provider connection settings live under "options"
    #   options:
    #     ### model name as your local server exposes it
    #     model: qwen2.5
    #     ### base url of the running server (ollama 11434, vllm 8000, mlx 8080)
    #     base_url: http://localhost:11434/v1
    #     ### optional api key; local servers usually ignore it, vault-backed
    #     ### with a !vault:<profile> tag when a real key is needed
    #     # key: not-needed
    #   ### optional free-form selector, usable via "ai ask --purpose"
    #   purpose: general
    #   ### the agent (composition) this profile runs
    #   agent: guarded
